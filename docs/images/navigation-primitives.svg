<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 310" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="720" height="310" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="30" fill="#ccd6f6" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="2">NAVIGATION PRIMITIVES</text>

  <!-- Movement group -->
  <g transform="translate(30, 55)">
    <rect x="0" y="0" width="210" height="232" rx="10" fill="#0f2040" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="105" y="28" fill="#60a5fa" font-size="14" font-weight="700" text-anchor="middle">Movement</text>
    <text x="105" y="44" fill="#4a6fa5" font-size="9" text-anchor="middle">traverse entities and time</text>

    <g transform="translate(15, 60)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#1a2744" stroke="#3b82f6" stroke-width="0.8"/>
      <text x="12" y="14" fill="#60a5fa" font-size="12" font-weight="700">π1</text>
      <text x="38" y="14" fill="#ccd6f6" font-size="10">walk_line</text>
      <text x="38" y="27" fill="#8892b0" font-size="8">step along a line</text>
    </g>
    <g transform="translate(15, 102)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#1a2744" stroke="#3b82f6" stroke-width="0.8"/>
      <text x="12" y="14" fill="#60a5fa" font-size="12" font-weight="700">π2</text>
      <text x="38" y="14" fill="#ccd6f6" font-size="10">jump_polygon</text>
      <text x="38" y="27" fill="#8892b0" font-size="8">cross to related line</text>
    </g>
    <g transform="translate(15, 144)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#1a2744" stroke="#3b82f6" stroke-width="0.8"/>
      <text x="12" y="14" fill="#60a5fa" font-size="12" font-weight="700">π3</text>
      <text x="38" y="14" fill="#ccd6f6" font-size="10">dive_solid</text>
      <text x="38" y="27" fill="#8892b0" font-size="8">enter temporal history</text>
    </g>
    <g transform="translate(15, 186)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#1a2744" stroke="#3b82f6" stroke-width="0.8"/>
      <text x="12" y="14" fill="#60a5fa" font-size="12" font-weight="700">π4</text>
      <text x="38" y="14" fill="#ccd6f6" font-size="10">emerge</text>
      <text x="38" y="27" fill="#8892b0" font-size="8">return to surface</text>
    </g>
  </g>

  <!-- Attraction group -->
  <g transform="translate(255, 55)">
    <rect x="0" y="0" width="210" height="232" rx="10" fill="#1a1500" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="105" y="28" fill="#fbbf24" font-size="14" font-weight="700" text-anchor="middle">Attraction</text>
    <text x="105" y="44" fill="#8b7200" font-size="9" text-anchor="middle">discover population structure</text>

    <g transform="translate(15, 60)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#2a1f00" stroke="#f59e0b" stroke-width="0.8"/>
      <text x="12" y="14" fill="#fbbf24" font-size="12" font-weight="700">π5</text>
      <text x="38" y="14" fill="#ccd6f6" font-size="10">attract_anomaly</text>
      <text x="38" y="27" fill="#8892b0" font-size="8">find outliers</text>
    </g>
    <g transform="translate(15, 102)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#2a1f00" stroke="#f59e0b" stroke-width="0.8"/>
      <text x="12" y="14" fill="#fbbf24" font-size="12" font-weight="700">π6</text>
      <text x="38" y="14" fill="#ccd6f6" font-size="10">attract_boundary</text>
      <text x="38" y="27" fill="#8892b0" font-size="8">near segment edge</text>
    </g>
    <g transform="translate(15, 144)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#2a1f00" stroke="#f59e0b" stroke-width="0.8"/>
      <text x="12" y="14" fill="#fbbf24" font-size="12" font-weight="700">π7</text>
      <text x="38" y="14" fill="#ccd6f6" font-size="10">attract_hub</text>
      <text x="38" y="27" fill="#8892b0" font-size="8">most connected</text>
    </g>
    <g transform="translate(15, 186)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#2a1f00" stroke="#f59e0b" stroke-width="0.8"/>
      <text x="12" y="14" fill="#fbbf24" font-size="12" font-weight="700">π8</text>
      <text x="38" y="14" fill="#ccd6f6" font-size="10">attract_cluster</text>
      <text x="38" y="27" fill="#8892b0" font-size="8">geometric archetypes</text>
    </g>
  </g>

  <!-- Temporal group -->
  <g transform="translate(480, 55)">
    <rect x="0" y="0" width="210" height="232" rx="10" fill="#0f0028" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="105" y="28" fill="#a78bfa" font-size="14" font-weight="700" text-anchor="middle">Temporal</text>
    <text x="105" y="44" fill="#5b3a9e" font-size="9" text-anchor="middle">track change over time</text>

    <g transform="translate(15, 60)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#1a0040" stroke="#8b5cf6" stroke-width="0.8"/>
      <text x="12" y="14" fill="#a78bfa" font-size="12" font-weight="700">π9</text>
      <text x="42" y="14" fill="#ccd6f6" font-size="10">attract_drift</text>
      <text x="42" y="27" fill="#8892b0" font-size="8">most changed entities</text>
    </g>
    <g transform="translate(15, 102)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#1a0040" stroke="#8b5cf6" stroke-width="0.8"/>
      <text x="12" y="14" fill="#a78bfa" font-size="12" font-weight="700">π10</text>
      <text x="46" y="14" fill="#ccd6f6" font-size="10">attract_trajectory</text>
      <text x="46" y="27" fill="#8892b0" font-size="8">similar histories</text>
    </g>
    <g transform="translate(15, 144)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#1a0040" stroke="#8b5cf6" stroke-width="0.8"/>
      <text x="12" y="14" fill="#a78bfa" font-size="12" font-weight="700">π11</text>
      <text x="46" y="14" fill="#ccd6f6" font-size="10">population_compare</text>
      <text x="46" y="27" fill="#8892b0" font-size="8">two time windows</text>
    </g>
    <g transform="translate(15, 186)">
      <rect x="0" y="0" width="180" height="34" rx="6" fill="#1a0040" stroke="#8b5cf6" stroke-width="0.8"/>
      <text x="12" y="14" fill="#a78bfa" font-size="12" font-weight="700">π12</text>
      <text x="46" y="14" fill="#ccd6f6" font-size="10">regime_change</text>
      <text x="46" y="27" fill="#8892b0" font-size="8">structural shifts</text>
    </g>
  </g>
</svg>
