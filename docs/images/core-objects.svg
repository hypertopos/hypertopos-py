<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>

  <rect width="760" height="340" fill="url(#bg)" rx="12"/>

  <!-- ===== Row 1: Sphere → Line → Point ===== -->

  <!-- Sphere -->
  <g transform="translate(30, 25)">
    <rect x="0" y="0" width="160" height="60" rx="10" fill="#0f2040" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="80" y="25" fill="#60a5fa" font-size="16" font-weight="700" text-anchor="middle">Sphere</text>
    <text x="80" y="43" fill="#93c5fd" font-size="9" text-anchor="middle">top-level container</text>
  </g>

  <!-- Arrow Sphere → Line -->
  <g>
    <line x1="200" y1="55" x2="240" y2="55" stroke="#22d3ee" stroke-width="2"/>
    <polygon points="240,50 250,55 240,60" fill="#22d3ee"/>
    <text x="225" y="48" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">contains</text>
  </g>

  <!-- Line -->
  <g transform="translate(260, 25)">
    <rect x="0" y="0" width="160" height="60" rx="10" fill="#0f2040" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="80" y="25" fill="#22d3ee" font-size="16" font-weight="700" text-anchor="middle">Line</text>
    <text x="80" y="43" fill="#67e8f9" font-size="9" text-anchor="middle">versioned entity collection</text>
  </g>

  <!-- Arrow Line → Point -->
  <g>
    <line x1="430" y1="55" x2="470" y2="55" stroke="#8892b0" stroke-width="2"/>
    <polygon points="470,50 480,55 470,60" fill="#8892b0"/>
    <text x="455" y="48" fill="#8892b0" font-size="9" font-weight="600" text-anchor="middle">stores</text>
  </g>

  <!-- Point -->
  <g transform="translate(490, 25)">
    <rect x="0" y="0" width="160" height="60" rx="10" fill="#1a1a3e" stroke="#8892b0" stroke-width="1.5"/>
    <text x="80" y="25" fill="#ccd6f6" font-size="16" font-weight="700" text-anchor="middle">Point</text>
    <text x="80" y="43" fill="#a8b2d1" font-size="9" text-anchor="middle">single entity record</text>
  </g>

  <!-- ===== Row 2: Pattern → Polygon → Solid ===== -->

  <!-- Pattern -->
  <g transform="translate(30, 130)">
    <rect x="0" y="0" width="160" height="60" rx="10" fill="#001a0a" stroke="#2ed573" stroke-width="1.5"/>
    <text x="80" y="25" fill="#2ed573" font-size="16" font-weight="700" text-anchor="middle">Pattern</text>
    <text x="80" y="43" fill="#6ee7b7" font-size="9" text-anchor="middle">μ, σ, θ population model</text>
  </g>

  <!-- Arrow Pattern → Polygon -->
  <g>
    <line x1="200" y1="160" x2="240" y2="160" stroke="#2ed573" stroke-width="2"/>
    <polygon points="240,155 250,160 240,165" fill="#2ed573"/>
    <text x="225" y="152" fill="#2ed573" font-size="9" font-weight="600" text-anchor="middle">calibrates</text>
  </g>

  <!-- Polygon -->
  <g transform="translate(260, 120)">
    <rect x="0" y="0" width="190" height="80" rx="10" fill="#0f2040" stroke="#3b82f6" stroke-width="2"/>
    <text x="95" y="26" fill="#60a5fa" font-size="18" font-weight="700" text-anchor="middle">Polygon</text>
    <text x="95" y="46" fill="#93c5fd" font-size="10" text-anchor="middle">shape + edges + delta</text>
    <text x="95" y="62" fill="#ccd6f6" font-size="9" text-anchor="middle">δ = (s − μ) ⊘ σ</text>
    <text x="95" y="74" fill="#4a6fa5" font-size="8" text-anchor="middle">current geometric view</text>
  </g>

  <!-- Arrow Polygon → Solid -->
  <g>
    <line x1="460" y1="160" x2="500" y2="160" stroke="#a78bfa" stroke-width="2"/>
    <polygon points="500,155 510,160 500,165" fill="#a78bfa"/>
    <text x="485" y="152" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">over time</text>
  </g>

  <!-- Solid -->
  <g transform="translate(520, 120)">
    <rect x="6" y="-4" width="118" height="72" rx="8" fill="none" stroke="#a78bfa" stroke-width="0.3" opacity="0.2"/>
    <rect x="3" y="-2" width="124" height="76" rx="9" fill="none" stroke="#a78bfa" stroke-width="0.3" opacity="0.15"/>
    <rect x="0" y="0" width="130" height="80" rx="10" fill="#1a0028" stroke="#a78bfa" stroke-width="2"/>
    <text x="65" y="26" fill="#a78bfa" font-size="18" font-weight="700" text-anchor="middle">Solid</text>
    <text x="65" y="46" fill="#c4b5fd" font-size="10" text-anchor="middle">temporal stack</text>
    <text x="65" y="62" fill="#ccd6f6" font-size="9" text-anchor="middle">τ = (δ₁, ..., δₜ)</text>
    <text x="65" y="74" fill="#5b3a9e" font-size="8" text-anchor="middle">history over time</text>
  </g>

  <!-- ===== Row 3: Alias + Edge ===== -->

  <!-- Alias -->
  <g transform="translate(30, 245)">
    <rect x="0" y="0" width="160" height="60" rx="10" fill="#1a1000" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="80" y="25" fill="#fbbf24" font-size="16" font-weight="700" text-anchor="middle">Alias</text>
    <text x="80" y="43" fill="#fcd34d" font-size="9" text-anchor="middle">sub-population filter</text>
  </g>

  <!-- Arrow Alias → Pattern -->
  <g>
    <line x1="110" y1="245" x2="110" y2="195" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="105,198 110,190 115,198" fill="#fbbf24"/>
    <text x="130" y="224" fill="#fbbf24" font-size="9" font-weight="600">filters</text>
  </g>

  <!-- Edge -->
  <g transform="translate(260, 245)">
    <rect x="0" y="0" width="160" height="60" rx="10" fill="#1a1a3e" stroke="#8892b0" stroke-width="1"/>
    <text x="80" y="25" fill="#ccd6f6" font-size="16" font-weight="600" text-anchor="middle">Edge</text>
    <text x="80" y="43" fill="#8892b0" font-size="9" text-anchor="middle">typed relation to another line</text>
  </g>

  <!-- Arrow Edge → Polygon -->
  <g>
    <line x1="340" y1="245" x2="360" y2="205" stroke="#8892b0" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
    <text x="370" y="232" fill="#8892b0" font-size="9">part of</text>
  </g>

  <!-- Vertical connector: Sphere defines Pattern -->
  <g>
    <line x1="80" y1="90" x2="80" y2="125" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
    <text x="95" y="112" fill="#3b82f6" font-size="9" font-weight="600" opacity="0.7">defines</text>
  </g>

  <!-- Vertical connector: Point → Polygon -->
  <g>
    <line x1="570" y1="90" x2="400" y2="118" stroke="#8892b0" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
    <text x="500" y="98" fill="#8892b0" font-size="9" opacity="0.6">build geometry</text>
  </g>
</svg>
