<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>

  <rect width="900" height="400" fill="url(#bg)" rx="12"/>

  <text x="450" y="32" fill="#ccd6f6" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="2">MODEL OBJECT LIFECYCLE</text>

  <!-- ===== Row 1: Line → Point → Polygon → Solid ===== -->

  <!-- Line -->
  <g transform="translate(30, 65)">
    <rect x="0" y="0" width="145" height="70" rx="10" fill="#0f2040" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="72" y="30" fill="#22d3ee" font-size="17" font-weight="700" text-anchor="middle">Line</text>
    <text x="72" y="50" fill="#ccd6f6" font-size="11" text-anchor="middle">entity collection</text>
  </g>

  <!-- Arrow: contains -->
  <g>
    <line x1="185" y1="100" x2="250" y2="100" stroke="#60a5fa" stroke-width="2"/>
    <polygon points="250,-5 260,0 250,5" transform="translate(0,100)" fill="#60a5fa"/>
    <text x="220" y="92" fill="#60a5fa" font-size="10" font-weight="600" text-anchor="middle">contains</text>
  </g>

  <!-- Point -->
  <g transform="translate(270, 65)">
    <rect x="0" y="0" width="145" height="70" rx="10" fill="#1a1a3e" stroke="#8892b0" stroke-width="1.5"/>
    <text x="72" y="30" fill="#ccd6f6" font-size="17" font-weight="700" text-anchor="middle">Point</text>
    <text x="72" y="50" fill="#ccd6f6" font-size="11" text-anchor="middle">single entity</text>
  </g>

  <!-- Arrow: build geometry -->
  <g>
    <line x1="425" y1="100" x2="490" y2="100" stroke="#60a5fa" stroke-width="2"/>
    <polygon points="490,-5 500,0 490,5" transform="translate(0,100)" fill="#60a5fa"/>
    <text x="460" y="92" fill="#60a5fa" font-size="10" font-weight="600" text-anchor="middle">build geometry</text>
  </g>

  <!-- Polygon -->
  <g transform="translate(510, 55)">
    <rect x="0" y="0" width="165" height="90" rx="12" fill="#0f2040" stroke="#3b82f6" stroke-width="2"/>
    <text x="82" y="28" fill="#60a5fa" font-size="18" font-weight="700" text-anchor="middle">Polygon</text>
    <text x="82" y="48" fill="#93c5fd" font-size="11" text-anchor="middle">shape + edges + delta</text>
    <line x1="18" y1="56" x2="147" y2="56" stroke="#1e3a5f" stroke-width="0.5"/>
    <text x="82" y="74" fill="#ccd6f6" font-size="11" text-anchor="middle">δ = (s − μ) ⊘ σ</text>
  </g>

  <!-- Arrow: over time -->
  <g>
    <line x1="685" y1="100" x2="740" y2="100" stroke="#a78bfa" stroke-width="2"/>
    <polygon points="740,-5 750,0 740,5" transform="translate(0,100)" fill="#a78bfa"/>
    <text x="715" y="92" fill="#a78bfa" font-size="10" font-weight="600" text-anchor="middle">over time</text>
  </g>

  <!-- Solid -->
  <g transform="translate(760, 55)">
    <rect x="6" y="-4" width="113" height="82" rx="10" fill="none" stroke="#a78bfa" stroke-width="0.4" opacity="0.2"/>
    <rect x="3" y="-2" width="119" height="86" rx="10" fill="none" stroke="#a78bfa" stroke-width="0.3" opacity="0.15"/>
    <rect x="0" y="0" width="125" height="90" rx="12" fill="#1a0028" stroke="#a78bfa" stroke-width="2"/>
    <text x="62" y="28" fill="#a78bfa" font-size="18" font-weight="700" text-anchor="middle">Solid</text>
    <text x="62" y="48" fill="#c4b5fd" font-size="11" text-anchor="middle">temporal stack</text>
    <line x1="15" y1="56" x2="110" y2="56" stroke="#2a0050" stroke-width="0.5"/>
    <text x="62" y="74" fill="#ccd6f6" font-size="11" text-anchor="middle">τ = (δ₁, ..., δₜ)</text>
  </g>

  <!-- ===== Row 2: Edge, Pattern, Alias ===== -->

  <!-- Edge -->
  <g transform="translate(30, 240)">
    <rect x="0" y="0" width="145" height="65" rx="8" fill="#1a1a3e" stroke="#8892b0" stroke-width="1"/>
    <text x="72" y="26" fill="#ccd6f6" font-size="15" font-weight="600" text-anchor="middle">Edge</text>
    <text x="72" y="46" fill="#8892b0" font-size="10" text-anchor="middle">line · key · direction</text>
  </g>
  <line x1="105" y1="240" x2="560" y2="150" stroke="#8892b0" stroke-width="1" stroke-dasharray="5,3" opacity="0.3"/>
  <text x="90" y="232" fill="#8892b0" font-size="10" font-weight="600">part of polygon</text>

  <!-- Pattern -->
  <g transform="translate(270, 230)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#001a0a" stroke="#2ed573" stroke-width="1.5"/>
    <text x="100" y="28" fill="#2ed573" font-size="17" font-weight="700" text-anchor="middle">Pattern</text>
    <text x="100" y="48" fill="#6ee7b7" font-size="11" text-anchor="middle">μ, σ, θ population stats</text>
    <text x="100" y="66" fill="#ccd6f6" font-size="10" text-anchor="middle">calibrates the geometry</text>
  </g>

  <!-- Dashed arrow Pattern → Polygon -->
  <g>
    <line x1="445" y1="230" x2="555" y2="150" stroke="#2ed573" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="552,153 560,145 558,157" fill="#2ed573"/>
    <text x="515" y="198" fill="#2ed573" font-size="10" font-weight="600">calibrates</text>
  </g>

  <!-- Alias -->
  <g transform="translate(565, 230)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#1a1000" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="100" y="28" fill="#fbbf24" font-size="17" font-weight="700" text-anchor="middle">Alias</text>
    <text x="100" y="48" fill="#fcd34d" font-size="11" text-anchor="middle">cutting plane filter</text>
    <text x="100" y="66" fill="#ccd6f6" font-size="10" text-anchor="middle">w · δ ≥ b</text>
  </g>

  <!-- Dashed arrow Alias → Pattern -->
  <g>
    <line x1="565" y1="270" x2="475" y2="270" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4"/>
    <polygon points="478,266 470,270 478,274" fill="#fbbf24"/>
    <text x="520" y="262" fill="#fbbf24" font-size="10" font-weight="600">filters</text>
  </g>
</svg>
