<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 450" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>

  <rect width="760" height="450" fill="url(#bg)" rx="12"/>

  <!-- Root -->
  <rect x="270" y="16" width="220" height="38" rx="10" fill="#1a1040" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="380" y="41" fill="#e0d4ff" font-size="15" font-weight="700" text-anchor="middle">gds_{sphere_id}/</text>

  <!-- Tree connectors -->
  <line x1="380" y1="54" x2="380" y2="72" stroke="#444466" stroke-width="1.2"/>
  <line x1="100" y1="72" x2="663" y2="72" stroke="#444466" stroke-width="1.2"/>
  <line x1="100" y1="72" x2="100" y2="92" stroke="#444466" stroke-width="1.2"/>
  <line x1="288" y1="72" x2="288" y2="92" stroke="#444466" stroke-width="1.2"/>
  <line x1="480" y1="72" x2="480" y2="92" stroke="#444466" stroke-width="1.2"/>
  <line x1="663" y1="72" x2="663" y2="92" stroke="#444466" stroke-width="1.2"/>

  <!-- ===== _gds_meta/ (purple) ===== -->
  <g transform="translate(20, 92)">
    <rect x="0" y="0" width="160" height="320" rx="8" fill="#0f0f28" stroke="#a78bfa" stroke-width="1"/>
    <text x="80" y="24" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle">_gds_meta/</text>
    <line x1="10" y1="32" x2="150" y2="32" stroke="#a78bfa" stroke-opacity="0.3" stroke-width="0.5"/>

    <rect x="10" y="42" width="140" height="28" rx="5" fill="#1a1040" stroke="#a78bfa" stroke-width="0.7"/>
    <text x="80" y="60" fill="#c4b5fd" font-size="10" text-anchor="middle">sphere.json</text>
    <text x="80" y="82" fill="#8b7fc4" font-size="8" text-anchor="middle">config &amp; population stats</text>
    <text x="80" y="94" fill="#6b5fa4" font-size="7.5" text-anchor="middle" font-style="italic">loaded on open (few KB)</text>

    <rect x="10" y="110" width="140" height="28" rx="5" fill="#1a1040" stroke="#a78bfa" stroke-width="0.7"/>
    <text x="80" y="128" fill="#c4b5fd" font-size="10" text-anchor="middle">geometry_stats/</text>
    <text x="80" y="150" fill="#8b7fc4" font-size="8" text-anchor="middle">precomputed summaries</text>

    <rect x="10" y="168" width="140" height="28" rx="5" fill="#1a1040" stroke="#a78bfa" stroke-width="0.7"/>
    <text x="80" y="186" fill="#c4b5fd" font-size="10" text-anchor="middle">trajectory/</text>
    <text x="80" y="208" fill="#8b7fc4" font-size="8" text-anchor="middle">ANN index for π10</text>

    <rect x="10" y="226" width="140" height="28" rx="5" fill="#1a1040" stroke="#a78bfa" stroke-width="0.7"/>
    <text x="80" y="244" fill="#c4b5fd" font-size="10" text-anchor="middle">temporal_centroids/</text>
    <text x="80" y="266" fill="#8b7fc4" font-size="8" text-anchor="middle">centroid cache for π11/π12</text>
  </g>

  <!-- ===== points/ (blue) ===== -->
  <g transform="translate(200, 92)">
    <rect x="0" y="0" width="175" height="320" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1"/>
    <text x="88" y="24" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">points/</text>
    <line x1="10" y1="32" x2="165" y2="32" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="0.5"/>

    <rect x="10" y="42" width="155" height="28" rx="5" fill="#0f2040" stroke="#3b82f6" stroke-width="0.7"/>
    <text x="88" y="60" fill="#93c5fd" font-size="10" text-anchor="middle">{line_id}/v={n}/</text>
    <text x="88" y="82" fill="#5a8ac0" font-size="8" text-anchor="middle">entity data per line version</text>
    <text x="88" y="94" fill="#5a8ac0" font-size="8" text-anchor="middle">one Lance dataset per version</text>

    <rect x="10" y="112" width="155" height="28" rx="5" fill="#0f2040" stroke="#3b82f6" stroke-width="0.7"/>
    <text x="88" y="130" fill="#93c5fd" font-size="10" text-anchor="middle">BTREE + FTS indices</text>
    <text x="88" y="152" fill="#5a8ac0" font-size="8" text-anchor="middle">key lookup &amp; full-text search</text>
    <text x="88" y="164" fill="#5a8ac0" font-size="8" text-anchor="middle">FTS on anchor lines only</text>
  </g>

  <!-- ===== geometry/ (amber) ===== -->
  <g transform="translate(393, 92)">
    <rect x="0" y="0" width="175" height="320" rx="8" fill="#1a1500" stroke="#f59e0b" stroke-width="1"/>
    <text x="88" y="24" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">geometry/</text>
    <line x1="10" y1="32" x2="165" y2="32" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="0.5"/>

    <rect x="10" y="42" width="155" height="28" rx="5" fill="#2a1f00" stroke="#f59e0b" stroke-width="0.7"/>
    <text x="88" y="60" fill="#fcd34d" font-size="10" text-anchor="middle">{pattern_id}/v={n}/</text>
    <text x="88" y="82" fill="#b89a40" font-size="8" text-anchor="middle">delta vectors, edges, norms</text>
    <text x="88" y="94" fill="#b89a40" font-size="8" text-anchor="middle">anomaly flags, rank percentiles</text>

    <rect x="10" y="112" width="155" height="28" rx="5" fill="#2a1f00" stroke="#f59e0b" stroke-width="0.7"/>
    <text x="88" y="130" fill="#fcd34d" font-size="10" text-anchor="middle">IVF-PQ ANN index</text>
    <text x="88" y="152" fill="#b89a40" font-size="8" text-anchor="middle">similarity search over δ</text>
  </g>

  <!-- ===== temporal/ (green) ===== -->
  <g transform="translate(586, 92)">
    <rect x="0" y="0" width="155" height="320" rx="8" fill="#001a0a" stroke="#2ed573" stroke-width="1"/>
    <text x="78" y="24" fill="#2ed573" font-size="13" font-weight="700" text-anchor="middle">temporal/</text>
    <line x1="10" y1="32" x2="145" y2="32" stroke="#2ed573" stroke-opacity="0.3" stroke-width="0.5"/>

    <rect x="10" y="42" width="135" height="28" rx="5" fill="#002a12" stroke="#2ed573" stroke-width="0.7"/>
    <text x="78" y="60" fill="#6ee7b7" font-size="10" text-anchor="middle">{pattern_id}/</text>
    <text x="78" y="82" fill="#3ca060" font-size="8" text-anchor="middle">deformation history</text>
    <text x="78" y="94" fill="#3ca060" font-size="8" text-anchor="middle">shape snapshots over time</text>

    <rect x="10" y="112" width="135" height="28" rx="5" fill="#002a12" stroke="#2ed573" stroke-width="0.7"/>
    <text x="78" y="130" fill="#6ee7b7" font-size="10" text-anchor="middle">rolling snapshots</text>
    <text x="78" y="152" fill="#3ca060" font-size="8" text-anchor="middle">per-entity δ at each window</text>
  </g>

  <!-- Bottom annotation -->
  <text x="380" y="433" fill="#7777aa" font-size="12" text-anchor="middle">All data files use Lance format (columnar, versioned). v={n} directories are Hive-style version partitions.</text>
</svg>
